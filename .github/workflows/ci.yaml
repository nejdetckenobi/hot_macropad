name: Build Debian Package

on:
  push:
    branches:
      - master
    tags:
      - '[0-9]*'
  pull_request:
    branches:
      - master

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lintian

      - name: Read and validate version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "$version"
          dpkg --validate-version "$version"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            test "$tag" = "$version" || {
              echo "Tag $tag does not match VERSION $version" >&2
              exit 1
            }
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Debian package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          package_root="build/hot-macropad_${VERSION}_all"

          install -Dm755 hot-macropad "$package_root/usr/bin/hot-macropad"
          install -Dm644 hot-macropad@.service \
            "$package_root/usr/lib/systemd/user/hot-macropad@.service"
          install -Dm644 README.md \
            "$package_root/usr/share/doc/hot-macropad/README.md"
          install -Dm644 LICENSE \
            "$package_root/usr/share/doc/hot-macropad/copyright"
          gzip -9n -c CHANGELOG.md > \
            "$package_root/usr/share/doc/hot-macropad/CHANGELOG.md.gz"
          release_date="$(date --utc --date="@$(git show -s --format=%ct)" --rfc-email)"
          printf '%s\n' \
            "hot-macropad ($VERSION) unstable; urgency=medium" \
            '' \
            "  * Release $VERSION." \
            '' \
            " -- Nejdet Çağdaş Yücesoy <nejdetyucesoy@gmail.com>  $release_date" \
            | gzip -9n > \
              "$package_root/usr/share/doc/hot-macropad/changelog.gz"
          chmod 0644 "$package_root/usr/share/doc/hot-macropad/CHANGELOG.md.gz"
          chmod 0644 "$package_root/usr/share/doc/hot-macropad/changelog.gz"

          mkdir -p "$package_root/DEBIAN"
          tee "$package_root/DEBIAN/control" >/dev/null <<EOF
          Package: hot-macropad
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: all
          Maintainer: Nejdet Çağdaş Yücesoy <nejdetyucesoy@gmail.com>
          Depends: evtest
          Recommends: xdotool
          Description: Script-driven macropad daemon using evdev
           Hot Macropad is a user-level daemon that binds Linux input devices
           to executable scripts. Each key can trigger a shell script and
           scripts may request page switches at runtime.
          EOF

          mkdir -p artifacts
          dpkg-deb --build --root-owner-group "$package_root" \
            "artifacts/hot-macropad_${VERSION}_all.deb"

      - name: Validate Debian package
        run: |
          dpkg-deb --info artifacts/*.deb
          lintian artifacts/*.deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hot-macropad-deb
          path: artifacts/*.deb

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
